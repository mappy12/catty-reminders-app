name: CI

on:
  push:
    branches: [lab4, lab4*]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:11.8.6-ubi9
        env:
          MARIADB_ROOT_PASSWORD: rootpass
          MARIADB_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright uvicorn
          playwright install chromium

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Create correct config.json for tests
        run: |
          cat > config.json << 'EOF'
          {
              "users": [
                  {"username": "tester", "password": "foobar123"}
              ],
              "db_config": {
                  "host": "localhost",
                  "port": 3306,
                  "user": "root",
                  "password": "rootpass",
                  "database": "catty_reminders"
              },
              "db_path": "reminder_db.json",
              "secret_key": "Cats are awesome!"
          }
          EOF
          cat config.json

      - name: Start application in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 5
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests and save results
        run: |
          pytest tests/ -v --tb=short --junit-xml=test_result.xml
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Check if tests passed
        run: |
          if grep -q "failures=\"0\"" test_result.xml; then
            echo "✅ All tests passed!"
          else
            echo "❌ Tests failed!"
            cat test_result.xml
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/mappy12/catty-reminders-app:lab4
            ghcr.io/mappy12/catty-reminders-app:${{ github.sha }}
